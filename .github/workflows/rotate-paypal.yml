name: Rotate PayPal Email

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install puppeteer

      - name: Determine next email
        id: email
        run: |
          # Read current index (default 0)
          INDEX=0
          if [ -f index.txt ]; then
            INDEX=$(cat index.txt)
          fi

          # Email list
          EMAILS=(
            "malikaaarour912@gmail.com"
            "ouhassmohamed6@gmail.com"
            "achabbakhsamira@gmail.com"
            "arrourkhadija99@proton.me"
            "othmanassaoui04@gmail.com"
            "mammabajji@outlook.fr"
            "rachidelfallahi@outlook.com"
          )

          # Get current email
          TOTAL=${#EMAILS[@]}
          CURRENT=${EMAILS[$INDEX]}
          NEXT_INDEX=$(( (INDEX + 1) % TOTAL ))

          echo "email=$CURRENT" >> $GITHUB_OUTPUT
          echo "next_index=$NEXT_INDEX" >> $GITHUB_OUTPUT
          echo "Current index: $INDEX, Email: $CURRENT, Next index: $NEXT_INDEX"

      - name: Run PayPal rotation
        env:
          YOUCAN_EMAIL: ${{ secrets.YOUCAN_EMAIL }}
          YOUCAN_PASSWORD: ${{ secrets.YOUCAN_PASSWORD }}
          PAYPAL_EMAIL: ${{ steps.email.outputs.email }}
        run: node rotate.js

      - name: Save next index
        run: echo "${{ steps.email.outputs.next_index }}" > index.txt

      - name: Commit index
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.txt
          git diff --cached --quiet || git commit -m "Update email index to ${{ steps.email.outputs.next_index }}"
          git push
